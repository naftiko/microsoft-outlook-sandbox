name = "naftiko-microsoft-outlook-sandbox"
main = "src/index.ts"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "MicrosoftOutlookSandboxContainer"
image = "./Dockerfile"
instance_type = "standard-1"
max_instances = 1

[[durable_objects.bindings]]
name = "MICROSOFT_OUTLOOK_SANDBOX"
class_name = "MicrosoftOutlookSandboxContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MicrosoftOutlookSandboxContainer"]
