naftiko: "1.0.0-alpha2"

info:
  label: "Microsoft Outlook Sandbox"
  description: "Naftiko Sandbox — wraps the Microsoft Outlook API mocks hosted at mocks.naftiko.net. Exposes MCP, REST, and Skill adapters for AI agents and downstream tools."
  tags:
    - "Microsoft Outlook"
    - "Naftiko Sandbox"
    - MCP
    - Mocks

binds:
  - namespace: "sandbox-env"
    description: "Sandbox bearer token for the Naftiko Framework MCP server."
    location: "file:///./shared/secrets.yaml"
    keys:
      MCP_SERVER_TOKEN: "mcp-server-token"

capability:
  consumes:
    - import: microsoft-outlook-calendar-api
      location: ./shared/microsoft-outlook-calendar-api-consumes.yml

  exposes:
    - type: mcp
      address: "0.0.0.0"
      port: 3001
      namespace: microsoft-outlook-sandbox-tools
      authentication:
        type: bearer
        token: "{{MCP_SERVER_TOKEN}}"
      description: "Microsoft Outlook MCP tools — backed by mocks.naftiko.net"
      tools:
        - name: get-group-calendar
          description: "Get group calendar"
          call: microsoft-outlook-calendar-api.get-group-calendar
        - name: get-user-calendar
          description: "Get calendar"
          call: microsoft-outlook-calendar-api.get-user-calendar
        - name: list-calendar-events
          description: "List events in a calendar"
          call: microsoft-outlook-calendar-api.list-calendar-events

    - type: rest
      address: "0.0.0.0"
      port: 3002
      namespace: microsoft-outlook-sandbox-api
      description: "Microsoft Outlook REST adapter — exposes the same domain as REST resources."
      resources:
        - name: get-group-calendar
          path: "/get-group-calendar"
          operations:
            - method: GET
              call: microsoft-outlook-calendar-api.get-group-calendar
        - name: get-user-calendar
          path: "/get-user-calendar"
          operations:
            - method: GET
              call: microsoft-outlook-calendar-api.get-user-calendar
        - name: list-calendar-events
          path: "/list-calendar-events"
          operations:
            - method: GET
              call: microsoft-outlook-calendar-api.list-calendar-events

    - type: skill
      address: "0.0.0.0"
      port: 3003
      namespace: microsoft-outlook-sandbox-skills
      description: "Microsoft Outlook skill server for structured agent discovery."
      groups:
        - name: read-microsoft-outlook
          description: "Read-only Microsoft Outlook operations."
          skills:
            - name: get-group-calendar
              call: microsoft-outlook-calendar-api.get-group-calendar
            - name: get-user-calendar
              call: microsoft-outlook-calendar-api.get-user-calendar
            - name: list-calendar-events
              call: microsoft-outlook-calendar-api.list-calendar-events
